general {
    lock_cmd = pidof hyprlock || hyprlock
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = hyprctl eval 'hl.dispatch(hl.dsp.dpms({ action = "on"}))' && brightnessctl -r
}

listener {
    timeout = 300
    on-timeout = brightnessctl -s set 4
    on-resume = brightnessctl -r
}

listener {
    timeout = 330
    on-timeout = hyprctl eval 'hl.dispatch(hl.dsp.dpms({ action = "off"}))' && loginctl lock-session
    on-resume = hyprctl eval 'hl.dispatch(hl.dsp.dpms({ action = "on"}))' && brightnessctl -r
}

listener {
    timeout = 7200
    on-timeout = systemctl suspend
}
